<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Borrow &amp; Die — Card Viewer</title>
  <!--
    Run `npm run preview` then open http://localhost:3000/card-viewer.html
    (fetch() requires a local HTTP server — direct file:// access will not work
     unless you launch Chrome/Edge with --allow-file-access-from-files)
  -->
  <link rel="stylesheet" href="card-viewer.css">
</head>
<body>
  <h1>Borrow &amp; Die — Card Viewer</h1>
  <div id="card-grid"></div>
  <ul id="card-list"></ul>

  <script type="module">
    // ── Constants ──────────────────────────────────────────────────

    const INDUSTRY_COLORS = {
      TECHNOLOGY:          'var(--color-industry-TECHNOLOGY)',
      ENERGY:              'var(--color-industry-ENERGY)',
      REAL_ESTATE:         'var(--color-industry-REAL_ESTATE)',
      FINANCE:             'var(--color-industry-FINANCE)',
      MANUFACTURING:       'var(--color-industry-MANUFACTURING)',
      MEDIA_ENTERTAINMENT: 'var(--color-industry-MEDIA_ENTERTAINMENT)',
      HYBRID:              'var(--color-industry-HYBRID)',
    };

    const TIER_COLORS = {
      1: '#aaaaaa',
      2: '#c9860a',
      3: '#9a2a2a',
    };

    const LTV_MAP = { 7: 70, 6: 60, 5: 50, 4: 40, 3: 30, 2: 20 };

    // ── Helpers ────────────────────────────────────────────────────

    function esc(str) {
      return String(str ?? '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    function industryColor(industry) {
      return INDUSTRY_COLORS[industry] ?? '#888780';
    }

    function industryLabel(industry) {
      if (industry === 'REAL_ESTATE') return 'REAL ESTATE';
      if (industry === 'MEDIA_ENTERTAINMENT') return 'MEDIA';
      return industry ?? 'UNKNOWN';
    }

    function formatRange(range) {
      if (!Array.isArray(range) || range.length < 2) return '?';
      return range[0] === range[1] ? String(range[0]) : `${range[0]}–${range[1]}`;
    }

    function stressPips(stress, maxPips = 3) {
      const filled = Math.min(stress, maxPips);
      const empty  = maxPips - filled;
      const atMax  = filled >= maxPips;
      const pips   = '●'.repeat(filled) + '○'.repeat(empty);
      const cls    = atMax ? 'stress-pips at-max' : 'stress-pips';
      return `<span class="${cls}">${pips}</span>`;
    }

    function deltaHtml(delta) {
      if (delta > 0)  return `<span class="delta-positive">+${delta}</span>`;
      if (delta < 0)  return `<span class="delta-negative">−${Math.abs(delta)}</span>`;
      return `<span class="delta-zero">0</span>`;
    }

    // ── renderAssetCard ────────────────────────────────────────────

    /**
     * Render a single ASSET card object into an HTML string.
     * @param {object} card  — card data conforming to card_schema.json
     * @returns {string}     — HTML string for the card element
     */
    function renderAssetCard(card) {
      const industryBg  = industryColor(card.industry);
      const tierBg      = TIER_COLORS[card.tier] ?? '#aaaaaa';
      const tierLabel   = `TIER ${card.tier ?? '?'}`;
      const ltvKey      = card.loanCapacityIncreasePer10AssetValue;
      const ltvPct      = LTV_MAP[ltvKey] != null ? `~${LTV_MAP[ltvKey]}%` : '—';

      // ── Header ──────────────────────────────────────────────────
      const headerHtml = `
        <div class="card-section card-header">
          <div class="card-header-badges">
            <span class="badge" style="background:${industryBg}">${esc(industryLabel(card.industry))}</span>
            <span class="badge" style="background:${tierBg}">${esc(tierLabel)}</span>
          </div>
          <div class="card-title">${esc(card.companyName)}</div>
          <div class="card-placement">${esc(card.placement ?? '')}</div>
        </div>`;

      // ── Stats ────────────────────────────────────────────────────
      const statsHtml = `
        <div class="card-section">
          <div class="stats-grid">
            <div class="stat-item"><strong>Base Value</strong> $${esc(card.baseValue)}</div>
            <div class="stat-item"><strong>Stress</strong> ${stressPips(card.stress ?? 0)}</div>
            <div class="stat-item"><strong>Income</strong> $${esc(card.income)}/yr</div>
            <div class="stat-item"><strong>Loan Cap</strong> ${esc(card.baseLoanCapacity)}</div>
            <div class="stat-item"><strong>LTV</strong> ${esc(ltvPct)}</div>
          </div>
        </div>`;

      // ── Value Update Roll ────────────────────────────────────────
      const vur = card.baseValueUpdateRule ?? {};
      const vurOutcomes = (vur.outcomes ?? []).map(o => `
        <tr>
          <td>${esc(formatRange(o.range))}</td>
          <td>${deltaHtml(o.delta)}</td>
        </tr>`).join('');

      const mechanic = vur.industryMechanic
        ? `<div class="industry-mechanic">${esc(vur.industryMechanic)}</div>`
        : '';

      const valueUpdateHtml = `
        <div class="card-section">
          <div class="section-heading">Value Update Roll</div>
          <table class="outcome-table">
            <thead><tr><th>Roll</th><th>Delta</th></tr></thead>
            <tbody>${vurOutcomes}</tbody>
          </table>
          ${mechanic}
        </div>`;

      // ── Loan Repayment Roll ──────────────────────────────────────
      const lrr = card.loanRepaymentRule ?? {};
      const lrrOutcomes = (lrr.outcomes ?? []).map(o => {
        const rowCls = o.relief ? ' class="relief-row"' : '';
        return `
        <tr${rowCls}>
          <td>${esc(formatRange(o.range))}</td>
          <td>${o.trigger  ? '✓' : '✗'}</td>
          <td>${o.relief   ? '✓' : '✗'}</td>
        </tr>`;
      }).join('');

      const loanRepaymentHtml = `
        <div class="card-section">
          <div class="section-heading">Loan Repayment Roll</div>
          <table class="outcome-table">
            <thead><tr><th>Roll</th><th>Trigger</th><th>Relief</th></tr></thead>
            <tbody>${lrrOutcomes}</tbody>
          </table>
        </div>`;

      // ── Vertical Integration ─────────────────────────────────────
      const viRules = card.verticalIntegrationRules ?? [];
      let verticalIntegrationHtml = '';
      if (viRules.length > 0) {
        const blocks = viRules.map(rule => {
          const pillBg = industryColor(rule.requiresIndustry ?? card.industry);
          return `
            <div class="integration-block">
              <span class="requires-pill" style="background:${pillBg}">REQUIRES: ${esc(rule.requiresIndustry)} ${esc(rule.requiresPlacement)}</span>
              <div class="integration-desc">${esc(rule.effectDescription)}</div>
            </div>`;
        }).join('');

        verticalIntegrationHtml = `
          <div class="card-section">
            <div class="section-heading">Vertical Integration</div>
            ${blocks}
          </div>`;
      }

      // ── Cross-Industry Synergy ────────────────────────────────────
      const ciSynergies = card.crossIndustrySynergies ?? [];
      let crossIndustrySynergyHtml = '';
      if (ciSynergies.length > 0) {
        const blocks = ciSynergies.map(syn => {
          const pillBg = industryColor(syn.requiresIndustry);
          return `
            <div class="integration-block">
              <span class="requires-pill" style="background:${pillBg}">REQUIRES: ${esc(syn.requiresIndustry)} ${esc(syn.requiresPlacement)}</span>
              <div class="integration-desc">${esc(syn.effectDescription)}</div>
            </div>`;
        }).join('');

        crossIndustrySynergyHtml = `
          <div class="card-section">
            <div class="section-heading">Cross-Industry Synergy</div>
            ${blocks}
          </div>`;
      }

      // ── Flavour text ─────────────────────────────────────────────
      const flavourHtml = card.flavourText
        ? `<div class="flavour-text">"${esc(card.flavourText)}"</div>`
        : '';

      // ── Assemble ─────────────────────────────────────────────────
      return `
        <div class="card">
          ${headerHtml}
          ${statsHtml}
          ${valueUpdateHtml}
          ${loanRepaymentHtml}
          ${verticalIntegrationHtml}
          ${crossIndustrySynergyHtml}
          ${flavourHtml}
        </div>`;
    }

    // ── Data loading ───────────────────────────────────────────────

    const CARD_FILES = [
      { file: 'technology-cards.json'     },
      { file: 'energy-cards.json'         },
      { file: 'real-estate-cards.json'    },
      { file: 'finance-cards.json'        },
      { file: 'manufacturing-cards.json'  },
      { file: 'media-cards.json'          },
      { file: 'hybrid-cards.json'         },
      { file: 'ceo-cards.json'            },
      { file: 'global-event-cards.json'   },
      { file: 'personal-event-cards.json' },
    ];

    function getPrimaryName(card) {
      switch (card.cardType) {
        case 'ASSET':          return card.companyName;
        case 'CEO':            return card.ceoName;
        case 'GLOBAL_EVENT':
        case 'PERSONAL_EVENT': return card.eventName;
        default:               return undefined;
      }
    }

    const datasets = await Promise.all(
      CARD_FILES.map(({ file }) =>
        fetch(`/cards/${file}`)
          .then(r => r.json())
          .catch(() => {
            console.warn(`Failed to load ${file} — some cards may be missing`);
            // Show non-blocking banner
            const banner = document.createElement('div');
            banner.style.cssText = 'position:fixed;top:0;left:0;right:0;background:#9a2a2a;color:#fff;font-size:12px;padding:6px 12px;z-index:9999;';
            banner.textContent = `Failed to load ${file} — some cards may be missing`;
            document.body.prepend(banner);
            setTimeout(() => banner.remove(), 6000);
            return [];
          })
      )
    );

    const allCards = datasets.flat();
    const grid = document.getElementById('card-grid');
    const ul   = document.getElementById('card-list');

    allCards.forEach((card, i) => {
      const name = getPrimaryName(card);
      if (!name) {
        console.warn(`Card at index ${i} is missing its primary name field.`, card);
      }

      if (card.cardType === 'ASSET') {
        grid.insertAdjacentHTML('beforeend', renderAssetCard(card));
      } else {
        // Non-ASSET card types will be rendered in future stories
        const li = document.createElement('li');
        li.textContent = `[${card.cardType}] ${name ?? '(unnamed)'}`;
        ul.appendChild(li);
      }
    });
  </script>
</body>
</html>

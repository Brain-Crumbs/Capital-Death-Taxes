<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Borrow &amp; Die — Card Viewer</title>
  <style>
    /* ── Design System: CSS Custom Properties ─────────────────────── */
    :root {
      /* Colors */
      --color-bg:               #f5f4f0;
      --color-surface:          #ffffff;
      --color-border:           #c8c6bc;
      --color-text:             #1a1a18;
      --color-text-muted:       #888780;
      --color-nav-active-bg:    #2c2c2a;
      --color-nav-active-text:  #ffffff;

      /* GMI sentiment */
      --color-gmi-positive:     #2a7a2a;
      --color-gmi-zero:         #888780;
      --color-gmi-negative:     #9a2a2a;

      /* Industry accent colors */
      --color-industry-technology:   #4a7c9e;
      --color-industry-energy:       #b5651d;
      --color-industry-real-estate:  #5a7a5a;
      --color-industry-finance:      #5a5a8a;
      --color-industry-manufacturing: #7a6a5a;
      --color-industry-media:        #8a5a7a;
      --color-industry-hybrid:       #5a7a7a;

      /* Shape */
      --radius-card: 10px;
      --radius-pill: 99px;

      /* Elevation */
      --shadow-card: 0 1px 3px rgba(0,0,0,0.07);
    }

    /* ── Base ─────────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--color-bg);
      color: var(--color-text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      padding: 32px 24px;
    }

    h1 {
      font-size: 20px;
      font-weight: 600;
      margin-bottom: 24px;
    }

    /* ── Card Shell ───────────────────────────────────────────────── */
    .card {
      background: var(--color-surface);
      border-radius: var(--radius-card);
      box-shadow: var(--shadow-card);
      border: 0.5px solid var(--color-border);
      width: 280px;
      padding: 16px;
      display: flex;
      flex-direction: column;
    }

    .card__header {
      margin-bottom: 8px;
    }

    .card__body {
      flex: 1;
    }

    .card__flavour {
      font-style: italic;
      color: var(--color-text-muted);
      font-size: 12px;
      border-top: 0.5px solid var(--color-border);
      margin-top: 12px;
      padding-top: 10px;
    }

    /* ── Badge ────────────────────────────────────────────────────── */
    .badge {
      display: inline-block;
      border-radius: var(--radius-pill);
      font-size: 11px;
      padding: 3px 8px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      font-weight: 500;
      background: var(--color-bg);
      color: var(--color-text-muted);
      border: 0.5px solid var(--color-border);
    }

    /* Industry badge color overrides */
    .badge--technology   { background: var(--color-industry-technology);   color: #fff; border-color: transparent; }
    .badge--energy       { background: var(--color-industry-energy);       color: #fff; border-color: transparent; }
    .badge--real-estate  { background: var(--color-industry-real-estate);  color: #fff; border-color: transparent; }
    .badge--finance      { background: var(--color-industry-finance);      color: #fff; border-color: transparent; }
    .badge--manufacturing{ background: var(--color-industry-manufacturing); color: #fff; border-color: transparent; }
    .badge--media        { background: var(--color-industry-media);        color: #fff; border-color: transparent; }
    .badge--hybrid       { background: var(--color-industry-hybrid);       color: #fff; border-color: transparent; }

    /* ── Card List Layout ─────────────────────────────────────────── */
    #card-list {
      list-style: none;
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
    }

    #card-list li {
      /* Each list item wraps exactly one .card */
    }

    /* Card name typography */
    .card__name {
      font-size: 14px;
      font-weight: 600;
      color: var(--color-text);
      margin-top: 8px;
    }

    .card__type-row {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }
  </style>
</head>
<body>
  <h1>Borrow &amp; Die — All Cards</h1>
  <ul id="card-list"></ul>

  <script type="module">
    // Card JSON files are served from data/cards/ via the /cards/ route.
    // Run `npm run preview` then open http://localhost:3000/card-viewer.html
    const CARD_FILES = [
      { variable: 'DATA_TECHNOLOGY',     file: 'technology-cards.json'     },
      { variable: 'DATA_ENERGY',         file: 'energy-cards.json'         },
      { variable: 'DATA_REAL_ESTATE',    file: 'real-estate-cards.json'    },
      { variable: 'DATA_FINANCE',        file: 'finance-cards.json'        },
      { variable: 'DATA_MANUFACTURING',  file: 'manufacturing-cards.json'  },
      { variable: 'DATA_MEDIA',          file: 'media-cards.json'          },
      { variable: 'DATA_HYBRID',         file: 'hybrid-cards.json'         },
      { variable: 'DATA_CEO',            file: 'ceo-cards.json'            },
      { variable: 'DATA_GLOBAL_EVENTS',  file: 'global-event-cards.json'   },
      { variable: 'DATA_PERSONAL_EVENTS',file: 'personal-event-cards.json' },
    ];

    function getPrimaryName(card) {
      switch (card.cardType) {
        case 'ASSET':          return card.companyName;
        case 'CEO':            return card.ceoName;
        case 'GLOBAL_EVENT':
        case 'PERSONAL_EVENT': return card.eventName;
        default:               return undefined;
      }
    }

    function getIndustrySlug(industry) {
      if (!industry) return null;
      return industry.toLowerCase().replace(/_/g, '-');
    }

    function buildCard(card, i) {
      const name = getPrimaryName(card);

      if (!name) {
        console.warn(`Card at index ${i} is missing its primary name field.`, card);
      }

      const li = document.createElement('li');

      const cardEl = document.createElement('div');
      cardEl.className = 'card';

      // ── Header: type badge + optional industry badge ──
      const header = document.createElement('div');
      header.className = 'card__header';

      const typeRow = document.createElement('div');
      typeRow.className = 'card__type-row';

      const typeBadge = document.createElement('span');
      typeBadge.className = 'badge';
      typeBadge.textContent = card.cardType ?? 'UNKNOWN';
      typeRow.appendChild(typeBadge);

      if (card.industry) {
        const industryBadge = document.createElement('span');
        const slug = getIndustrySlug(card.industry);
        industryBadge.className = `badge badge--${slug}`;
        industryBadge.textContent = card.industry;
        typeRow.appendChild(industryBadge);
      }

      header.appendChild(typeRow);
      cardEl.appendChild(header);

      // ── Body: card name ──
      const body = document.createElement('div');
      body.className = 'card__body';

      const nameEl = document.createElement('div');
      nameEl.className = 'card__name';
      nameEl.textContent = name ?? '(unnamed)';
      body.appendChild(nameEl);

      cardEl.appendChild(body);

      // ── Flavour text ──
      if (card.flavourText) {
        const flavour = document.createElement('div');
        flavour.className = 'card__flavour';
        flavour.textContent = card.flavourText;
        cardEl.appendChild(flavour);
      }

      li.appendChild(cardEl);
      return li;
    }

    const datasets = await Promise.all(
      CARD_FILES.map(({ file }) => fetch(`/cards/${file}`).then(r => r.json()))
    );

    const allCards = datasets.flat();
    const ul = document.getElementById('card-list');

    allCards.forEach((card, i) => {
      ul.appendChild(buildCard(card, i));
    });
  </script>
</body>
</html>
